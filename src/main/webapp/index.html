<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Insurance Claim Login</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container{

            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{

            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{

            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2{
            text-align: center;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form action="login" method="post">

        <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

        <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
